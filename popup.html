<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepSeek Bulk Delete</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <h1>DeepSeek Bulk Delete</h1>
    </div>
    <div class="main-card">
      <div class="buttons-wrapper">
        <div class="section checkbox-section">
          <h2 class="section-title">Checkbox Operations</h2>
          <div class="buttons-row">
            <div class="button-container">
              <button id="add-checkboxes">
                <span>Add</span><br /><span>Checkboxes</span>
              </button>
              <span class="tooltip-trigger" aria-label="information"
                >i
                <span class="tooltip-content"
                  >Hold Shift to select </br> multiple conversations.</span
                >
              </span>
            </div>
            <button id="remove-checkboxes">
              <span>Remove</span><br /><span>Checkboxes</span>
            </button>
          </div>
          <button id="toggle-checkboxes">Toggle Checkboxes</button>
        </div>

        <div class="section bulk-section">
          <h2 class="section-title">Bulk Operations</h2>
          <button id="bulk-delete" data-progress="0">Bulk Delete</button>
        </div>
      </div>
    </div>

    <div id="settingsPanel" class="settings-panel" hidden>
      <div class="settings-panel-inner">
        <div class="settings-panel-header">
          <span class="settings-panel-title">Settings</span>
          <button id="settingsClose" class="settings-close" type="button" aria-label="Close settings">
            &times;
          </button>
        </div>
        <div class="settings-row">
          <label for="operationDelayInput">Delay per conversation</label>
          <div class="delay-input-wrapper">
            <input
              id="operationDelayInput"
              type="number"
              min="300"
              max="10000"
              step="100"
            />
            <span>ms</span>
          </div>
        </div>
        <label class="settings-checkbox-row" for="autoSlowdownInput">
          <input id="autoSlowdownInput" type="checkbox" />
          <span>Auto slow down larger batches</span>
        </label>
        <p id="delayPreview" class="delay-preview"></p>
        <div class="settings-actions">
          <button id="resetDelaySettings" type="button">Reset</button>
          <button id="saveDelaySettings" type="button">Save</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <button id="settings-button" class="settings-button" title="Settings" aria-label="Settings">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M19.4 13.5c.1-.5.1-1 .1-1.5s0-1-.1-1.5l2-1.5-2-3.4-2.4 1a7.7 7.7 0 0 0-2.6-1.5L14 2.5h-4l-.4 2.6A7.7 7.7 0 0 0 7 6.6l-2.4-1-2 3.4 2 1.5c-.1.5-.1 1-.1 1.5s0 1 .1 1.5l-2 1.5 2 3.4 2.4-1a7.7 7.7 0 0 0 2.6 1.5l.4 2.6h4l.4-2.6a7.7 7.7 0 0 0 2.6-1.5l2.4 1 2-3.4-2-1.5ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/>
        </svg>
      </button>
      <a href="#" class="version-badge" id="version-badge" title="Check for updates">v</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
